dataset: meta-mini-imagenet
data_root: "C:/Users/aligunduz/PycharmProjects/PyTorch-MAML/data/miniImageNet/"
train:
  split: meta-train
  image_size: 84
  normalization: False
  transform: null
  n_batch: 200
  n_episode: 4
  n_way: 5
  n_shot: 5
  n_query: 15
val:
  split: meta-val
  image_size: 84
  normalization: False
  transform: null
  n_batch: 200
  n_episode: 6
  n_way: 5
  n_shot: 5
  n_query: 15

encoder: convnet4
encoder_args:
  bn_args:
    track_running_stats: False
classifier: logistic

inner_args:
  n_step: 5
  encoder_lr: 0.01
  classifier_lr: 0.01
  first_order: False
  frozen:
    - bn

optimizer: adam
optimizer_args:
  lr: 0.001
use_tensorboard: false
log_alignment: true
use_alignment_pre_loss: false
use_alignment_post_loss: false
alignment_pre_weight: 0.1
alignment_post_weight: 0.1
use_gradient_transport: true
gradient_transport_mode: prototype_conditioned_gate
task_gate_signal: proto_separability
task_gate_detach_signal: true
task_gate_residual_scale: 0.1
task_gate_gamma_scale: 1.0
task_gate_gamma_l2_weight: 0.001
task_gate_min: 0.5
task_gate_proto_metric: log_ratio
task_gate_proto_temperature: 1.0
task_gate_proto_intra_floor: 0.5
task_gate_proto_normalize_features: true
task_gate_collect_stats: true
epoch: 200
